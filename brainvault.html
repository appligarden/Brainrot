<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BrainVault｜基地管理</title>
<style>
  :root{
    --bg:#f7f8ff;
    --card:#ffffff;
    --line:#e5e7f3;
    --text:#24263a;
    --muted:#7a7e99;
    --main:#7668df;
    --main2:#9d91ff;
    --danger:#ed5f73;
    --shadow:0 12px 32px rgba(74, 65, 140, .10);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
    color:var(--text);
    background:linear-gradient(180deg,#eff0ff 0,#f8f9ff 300px);
  }
  button,input,textarea,select{font:inherit}
  button{cursor:pointer}
  .app{max-width:1120px;margin:0 auto;padding:22px 16px 64px}
  header{display:flex;justify-content:space-between;gap:14px;align-items:center;margin-bottom:22px}
  .brand h1{font-size:26px;margin:0;letter-spacing:.2px}
  .brand p{color:var(--muted);font-size:13px;margin:5px 0 0}
  .primary,.secondary,.danger,.icon-btn{
    border:0;border-radius:12px;padding:11px 15px;font-weight:700;transition:.18s transform,.18s opacity,.18s background;
  }
  .primary{background:var(--main);color:#fff;box-shadow:0 8px 18px rgba(118,104,223,.25)}
  .secondary{background:#ecebff;color:#5145b8}
  .danger{background:#ffedf0;color:#c53950}
  .icon-btn{padding:9px 10px;background:#f1f2fa;color:#666b85}
  button:hover{transform:translateY(-1px);opacity:.92}
  .toolbar{display:grid;grid-template-columns:1fr auto;gap:10px;margin-bottom:16px}
  .toolbar input{width:100%}
  input,textarea,select{
    border:1px solid var(--line);background:#fff;border-radius:12px;padding:11px 12px;color:var(--text);outline:none;
  }
  input:focus,textarea:focus,select:focus{border-color:var(--main2);box-shadow:0 0 0 3px rgba(157,145,255,.15)}
  textarea{min-height:78px;resize:vertical}
  .empty{
    background:rgba(255,255,255,.75);border:1px dashed #c7c9e7;border-radius:18px;
    padding:42px 18px;text-align:center;color:var(--muted)
  }
  .bases{display:grid;gap:16px}
  .base-card{background:var(--card);border:1px solid #ececf6;border-radius:20px;box-shadow:var(--shadow);overflow:hidden}
  .base-top{padding:17px 18px 13px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:start}
  .base-name{margin:0;font-size:19px}
  .total{font-size:13px;color:#5c529e;background:#f0efff;padding:8px 10px;border-radius:999px;white-space:nowrap}
  .base-memo{margin:9px 0 0;color:var(--muted);font-size:14px;white-space:pre-wrap}
  .base-actions{display:flex;gap:7px;justify-content:flex-end;padding:0 18px 15px;flex-wrap:wrap}
  .items{border-top:1px solid var(--line)}
  .item{
    display:grid;grid-template-columns:52px minmax(0,1fr) auto;align-items:center;
    gap:12px;padding:12px 18px;border-bottom:1px solid #f0f0f7;
  }
  .item:last-child{border-bottom:0}
  .item-icon{
    width:52px;height:52px;border-radius:15px;background:#f0f1fa;object-fit:cover;
    display:grid;place-items:center;color:#9a9db5;font-size:13px;overflow:hidden;
  }
  .item-name{font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item-memo{margin-top:4px;color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .item-right{text-align:right;display:flex;align-items:center;gap:8px}
  .value{font-size:14px;font-weight:800;color:#5145b8;white-space:nowrap}
  .mini-actions{display:flex;gap:5px}
  .item-empty{padding:22px 18px;color:var(--muted);font-size:14px}
  dialog{
    width:min(560px,calc(100vw - 28px));border:0;border-radius:20px;padding:0;box-shadow:0 22px 70px rgba(0,0,0,.28)
  }
  dialog::backdrop{background:rgba(28,25,55,.38);backdrop-filter:blur(2px)}
  .modal{padding:22px}
  .modal h2{margin:0 0 18px;font-size:20px}
  .fields{display:grid;gap:12px}
  .field label{display:block;margin:0 0 6px;font-size:13px;font-weight:750;color:#555a76}
  .field input,.field textarea{width:100%}
  .modal-actions{display:flex;justify-content:flex-end;gap:9px;margin-top:20px}
  .help{font-size:12px;color:var(--muted);margin:0}
  .sort{min-width:140px}
  @media(max-width:600px){
    .app{padding:16px 11px 48px}
    header{align-items:flex-start}
    header .primary{padding:10px 12px}
    .brand h1{font-size:22px}
    .toolbar{grid-template-columns:1fr}
    .base-top{grid-template-columns:1fr}
    .total{justify-self:start}
    .base-actions{justify-content:flex-start}
    .item{grid-template-columns:46px minmax(0,1fr);padding:12px}
    .item-icon{width:46px;height:46px}
    .item-right{grid-column:2;justify-content:space-between;text-align:left}
    .mini-actions{margin-left:auto}
  }
</style>
</head>
<body>
<main class="app">
  <header>
    <div class="brand">
      <h1>BrainVault</h1>
      <p>ブレインロット基地を、まとめて守る。</p>
    </div>
    <button class="primary" id="addBaseBtn">＋ 基地を追加</button>
  </header>

  <section class="toolbar">
    <input id="searchInput" placeholder="名前・メモで検索" autocomplete="off">
    <select class="sort" id="sortSelect">
      <option value="valueDesc">価値が高い順</option>
      <option value="valueAsc">価値が低い順</option>
      <option value="nameAsc">名前順</option>
      <option value="newest">追加が新しい順</option>
    </select>
  </section>

  <section class="bases" id="bases"></section>
</main>

<dialog id="baseDialog">
  <form method="dialog" class="modal" id="baseForm">
    <h2 id="baseDialogTitle">基地を追加</h2>
    <input type="hidden" id="baseId">
    <div class="fields">
      <div class="field">
        <label for="baseName">ユーザー名・基地名</label>
        <input id="baseName" maxlength="50" required placeholder="例：ゼロ（本垢）">
      </div>
      <div class="field">
        <label for="baseMemo">基地メモ</label>
        <textarea id="baseMemo" maxlength="500" placeholder="例：絶対に合成しない子たち。交換はしない。"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="secondary" type="button" data-close="baseDialog">キャンセル</button>
      <button class="primary" value="default">保存</button>
    </div>
  </form>
</dialog>

<dialog id="itemDialog">
  <form method="dialog" class="modal" id="itemForm">
    <h2 id="itemDialogTitle">ブレインロットを追加</h2>
    <input type="hidden" id="itemId">
    <input type="hidden" id="itemBaseId">
    <div class="fields">
      <div class="field">
        <label for="itemName">名前</label>
        <input id="itemName" maxlength="80" required placeholder="例：ラブラブベア">
      </div>
      <div class="field">
        <label for="itemValue">価値</label>
        <input id="itemValue" inputmode="decimal" required placeholder="例：500M / 1.2B / 250000000">
        <p class="help">M・B・T・Qにも対応。数字だけでもOK。</p>
      </div>
      <div class="field">
        <label for="itemIcon">アイコンURL</label>
        <input id="itemIcon" type="url" maxlength="1000" placeholder="https://...">
      </div>
      <div class="field">
        <label for="itemMemo">メモ</label>
        <textarea id="itemMemo" maxlength="500" placeholder="例：本垢保管、絶対に交換しない"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="secondary" type="button" data-close="itemDialog">キャンセル</button>
      <button class="primary" value="default">保存</button>
    </div>
  </form>
</dialog>

<script>
const KEY = "brainvault-data-v1";
let data = loadData();
let searchText = "";
let sortMode = "valueDesc";

function uid(prefix="id"){
  return prefix + "_" + Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function loadData(){
  try{
    const saved = JSON.parse(localStorage.getItem(KEY));
    if(saved && Array.isArray(saved.bases)) return saved;
  }catch(e){}
  return {
    bases:[
      {
        id:uid("base"),
        name:"ゼロ（本垢）",
        memo:"大好きな子たちはここに保管。絶対に合成しない。",
        items:[
          {id:uid("br"),name:"ラブラブベア",value:500000000,rawValue:"500M",iconUrl:"",memo:"お気に入り",createdAt:Date.now()-2000},
          {id:uid("br"),name:"キューピットマシーン",value:300000000,rawValue:"300M",iconUrl:"",memo:"懐かしい",createdAt:Date.now()-1000}
        ]
      }
    ]
  };
}
function saveData(){
  localStorage.setItem(KEY, JSON.stringify(data));
}
function escapeHtml(value=""){
  return String(value).replace(/[&<>"']/g, ch => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[ch]));
}
function formatValue(n){
  if(!Number.isFinite(n) || n === 0) return "0";
  const units = [
    [1e15,"Q"],[1e12,"T"],[1e9,"B"],[1e6,"M"],[1e3,"K"]
  ];
  for(const [size,label] of units){
    if(Math.abs(n) >= size){
      const v = n / size;
      return (Number.isInteger(v) ? v : v.toFixed(v >= 100 ? 0 : v >= 10 ? 1 : 2).replace(/\.0+$/,"")) + label;
    }
  }
  return Math.round(n).toLocaleString();
}
function parseValue(text){
  const normalized = String(text).trim().replace(/,/g,"").replace(/\s+/g,"").toUpperCase();
  const match = normalized.match(/^([0-9]*\.?[0-9]+)([KMBTQ]?)$/);
  if(!match) return null;
  const value = Number(match[1]);
  const unit = match[2];
  const mult = {K:1e3,M:1e6,B:1e9,T:1e12,Q:1e15,"":1}[unit];
  return Number.isFinite(value) ? value * mult : null;
}
function total(items){
  return items.reduce((sum,item)=>sum + (Number(item.value)||0),0);
}
function getFilteredItems(items){
  const q = searchText.trim().toLowerCase();
  let result = !q ? [...items] : items.filter(item =>
    [item.name,item.memo,item.rawValue].join(" ").toLowerCase().includes(q)
  );
  result.sort((a,b)=>{
    if(sortMode==="valueAsc") return a.value-b.value;
    if(sortMode==="nameAsc") return a.name.localeCompare(b.name,"ja");
    if(sortMode==="newest") return (b.createdAt||0)-(a.createdAt||0);
    return b.value-a.value;
  });
  return result;
}
function render(){
  const root = document.getElementById("bases");
  if(data.bases.length === 0){
    root.innerHTML = `<div class="empty"><strong>まだ基地がない。</strong><br>右上の「基地を追加」から、まず1つ作ろう。</div>`;
    return;
  }
  root.innerHTML = data.bases.map(base=>{
    const filtered = getFilteredItems(base.items || []);
    const cards = filtered.map(item=>{
      const icon = item.iconUrl
        ? `<img class="item-icon" src="${escapeHtml(item.iconUrl)}" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'item-icon',textContent:'No Img'}))">`
        : `<div class="item-icon">No Img</div>`;
      return `<article class="item">
        ${icon}
        <div>
          <div class="item-name">${escapeHtml(item.name)}</div>
          ${item.memo ? `<div class="item-memo">${escapeHtml(item.memo)}</div>` : ""}
        </div>
        <div class="item-right">
          <div class="value">${escapeHtml(item.rawValue || formatValue(item.value))}</div>
          <div class="mini-actions">
            <button class="icon-btn" title="編集" data-action="edit-item" data-base="${base.id}" data-item="${item.id}">✎</button>
            <button class="icon-btn" title="削除" data-action="delete-item" data-base="${base.id}" data-item="${item.id}">×</button>
          </div>
        </div>
      </article>`;
    }).join("");
    const emptyMessage = base.items.length === 0
      ? `<div class="item-empty">まだ保管されていない。追加していこう。</div>`
      : filtered.length === 0
        ? `<div class="item-empty">検索に一致するブレインロットがいない。</div>`
        : "";
    return `<section class="base-card">
      <div class="base-top">
        <div>
          <h2 class="base-name">${escapeHtml(base.name)}</h2>
          ${base.memo ? `<p class="base-memo">${escapeHtml(base.memo)}</p>` : ""}
        </div>
        <div class="total">合計価値：${formatValue(total(base.items || []))}</div>
      </div>
      <div class="base-actions">
        <button class="secondary" data-action="add-item" data-base="${base.id}">＋ ブレインロット追加</button>
        <button class="icon-btn" data-action="edit-base" data-base="${base.id}">基地を編集</button>
        <button class="icon-btn" data-action="delete-base" data-base="${base.id}">削除</button>
      </div>
      <div class="items">${cards || emptyMessage}</div>
    </section>`;
  }).join("");
}
function openBaseDialog(base=null){
  document.getElementById("baseDialogTitle").textContent = base ? "基地を編集" : "基地を追加";
  document.getElementById("baseId").value = base?.id || "";
  document.getElementById("baseName").value = base?.name || "";
  document.getElementById("baseMemo").value = base?.memo || "";
  document.getElementById("baseDialog").showModal();
  setTimeout(()=>document.getElementById("baseName").focus(),50);
}
function openItemDialog(baseId,item=null){
  document.getElementById("itemDialogTitle").textContent = item ? "ブレインロットを編集" : "ブレインロットを追加";
  document.getElementById("itemBaseId").value = baseId;
  document.getElementById("itemId").value = item?.id || "";
  document.getElementById("itemName").value = item?.name || "";
  document.getElementById("itemValue").value = item?.rawValue || "";
  document.getElementById("itemIcon").value = item?.iconUrl || "";
  document.getElementById("itemMemo").value = item?.memo || "";
  document.getElementById("itemDialog").showModal();
  setTimeout(()=>document.getElementById("itemName").focus(),50);
}
document.getElementById("addBaseBtn").addEventListener("click",()=>openBaseDialog());
document.getElementById("searchInput").addEventListener("input",e=>{searchText=e.target.value;render()});
document.getElementById("sortSelect").addEventListener("change",e=>{sortMode=e.target.value;render()});
document.querySelectorAll("[data-close]").forEach(btn=>btn.addEventListener("click",()=>document.getElementById(btn.dataset.close).close()));

document.getElementById("baseForm").addEventListener("submit",e=>{
  e.preventDefault();
  const id = document.getElementById("baseId").value;
  const name = document.getElementById("baseName").value.trim();
  const memo = document.getElementById("baseMemo").value.trim();
  if(!name) return;
  if(id){
    const base = data.bases.find(x=>x.id===id);
    Object.assign(base,{name,memo});
  }else{
    data.bases.push({id:uid("base"),name,memo,items:[]});
  }
  saveData(); render(); document.getElementById("baseDialog").close();
});

document.getElementById("itemForm").addEventListener("submit",e=>{
  e.preventDefault();
  const base = data.bases.find(x=>x.id===document.getElementById("itemBaseId").value);
  const id = document.getElementById("itemId").value;
  const name = document.getElementById("itemName").value.trim();
  const rawValue = document.getElementById("itemValue").value.trim();
  const value = parseValue(rawValue);
  const iconUrl = document.getElementById("itemIcon").value.trim();
  const memo = document.getElementById("itemMemo").value.trim();
  if(!base || !name) return;
  if(value === null){
    alert("価値は「500M」「1.2B」「250000000」のように入れてな。");
    return;
  }
  if(id){
    const item = base.items.find(x=>x.id===id);
    Object.assign(item,{name,value,rawValue,iconUrl,memo});
  }else{
    base.items.push({id:uid("br"),name,value,rawValue,iconUrl,memo,createdAt:Date.now()});
  }
  saveData(); render(); document.getElementById("itemDialog").close();
});

document.getElementById("bases").addEventListener("click",e=>{
  const btn = e.target.closest("[data-action]");
  if(!btn) return;
  const base = data.bases.find(x=>x.id===btn.dataset.base);
  const action = btn.dataset.action;
  if(action==="add-item") openItemDialog(base.id);
  if(action==="edit-base") openBaseDialog(base);
  if(action==="delete-base"){
    if(confirm(`「${base.name}」の基地と中身を全部削除する？`)){
      data.bases=data.bases.filter(x=>x.id!==base.id);saveData();render();
    }
  }
  if(action==="edit-item"){
    const item=base.items.find(x=>x.id===btn.dataset.item);
    openItemDialog(base.id,item);
  }
  if(action==="delete-item"){
    const item=base.items.find(x=>x.id===btn.dataset.item);
    if(confirm(`「${item.name}」を削除する？`)){
      base.items=base.items.filter(x=>x.id!==item.id);saveData();render();
    }
  }
});

render();
</script>
</body>
</html>
